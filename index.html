<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Directory</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f7f7f7; }
    h2 { margin-bottom: 10px; }
    input { width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card-content { padding: 15px; }
    .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    .description { font-size: 14px; color: #444; }
    .link { display: inline-block; margin-top: 12px; color: #007BFF; text-decoration: none; font-weight: bold; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<h2>Search Directory</h2>
<input type="text" id="search" placeholder="Type to search..." onkeyup="filterData()">
<div id="results" class="grid"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1X2OEmqsp2ArlCuaBBB6hywtrLYZhFWCno8NuQhWDNZ4/gviz/tq?tqx=out:json";
let allData = [];

function loadData() {
  fetch(SHEET_URL)
    .then(response => response.text())
    .then(data => {
      // Strip Google Sheets JSONP wrapper
      const json = JSON.parse(data.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const cols = json.table.cols.map(c => c.label);
      const rows = json.table.rows.map(r => {
        const obj = {};
        r.c.forEach((cell, i) => obj[cols[i]] = cell ? cell.v : "");
        return obj;
      });
      allData = rows;
      displayData(rows);
    });
}

function displayData(data) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  data.forEach(row => {
    const div = document.createElement('div');
    div.className = 'card';
    const name = row["BUSINESS NAME"] || "";
    const description = row["DESCRIPTION"] || "";
    const link = row["SITE LINK"] || "";
    const image = row["IMAGE"] || "";
    div.innerHTML = `
      ${image ? `<img src="${image}" alt="${name}">` : ""}
      <div class="card-content">
        <div class="title">${name}</div>
        <div class="description">${description}</div>
        ${link ? `<a class="link" href="${link}" target="_blank">Visit Website</a>` : ""}
      </div>
    `;
    container.appendChild(div);
  });
}

function filterData() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(row =>
    Object.values(row).some(val => String(val).toLowerCase().includes(query))
  );
  displayData(filtered);
}

window.onload = loadData;
</script>

</body>
</html>
